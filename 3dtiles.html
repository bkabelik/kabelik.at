<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabelik | Global Spatial Viewer</title>

    <!-- Cesium JS -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <!-- Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png"
        href="https://www.kabelik.at/wp-content/uploads/2019/05/cropped-logo_transparent_1_278.png">

    <style>
        body,
        html,
        #cesium-container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .glass-panel {
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .tech-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .cesium-viewer-bottom,
        .cesium-viewer-animationContainer,
        .cesium-viewer-timelineContainer {
            display: none !important;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }

        .loader {
            width: 44px;
            height: 44px;
            border: 2px solid #a2d032;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        button:hover {
            background: rgba(162, 208, 50, 0.1) !important;
            border-color: rgba(162, 208, 50, 0.5) !important;
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="loader"></div>
        <div class="mt-8 tech-font text-[#a2d032] text-[11px] tracking-[0.4em] uppercase font-bold">System Calibration
        </div>
        <div id="loading-status"
            class="mt-2 text-gray-500 text-[9px] uppercase tracking-widest font-bold animate-pulse">Establishing Geoid
            Offset (-44m)...</div>
    </div>

    <div id="cesium-container"></div>

    <!-- Top Overlay -->
    <nav class="fixed top-0 left-0 w-full p-6 flex justify-end items-center z-[5000] pointer-events-none">
        <div class="pointer-events-auto mr-auto">
            <a href="index.html"
                class="glass-panel px-5 py-2.5 text-[10px] uppercase font-bold text-gray-400 hover:text-[#a2d032] transition flex items-center gap-2">
                <span>←</span> Portal
            </a>
        </div>
        <div class="glass-panel px-6 py-4 flex items-center gap-6 pointer-events-auto">
            <div class="flex flex-col text-right">
                <div class="flex items-center gap-2 justify-end">
                    <div class="w-2 h-2 bg-[#a2d032] rounded-full shadow-[0_0_10px_#a2d032]"></div>
                    <span class="tech-font text-[11px] text-[#a2d032] font-bold uppercase tracking-widest">WGS84
                        Correction Active</span>
                </div>
                <span id="loc-display" class="text-[9px] text-gray-500 uppercase tracking-widest font-medium">Austria
                    Geospatial Sector</span>
            </div>
            <img src="https://www.kabelik.at/wp-content/uploads/2019/05/cropped-logo_transparent_1_278.png" alt="Logo"
                class="h-8">
        </div>
    </nav>

    <!-- Bottom Controls -->
    <div class="fixed bottom-8 left-8 glass-panel p-6 w-72 z-[5000] pointer-events-auto">
        <div class="space-y-4">
            <div>
                <div class="flex justify-between text-[11px] text-gray-500 uppercase tracking-widest mb-1.5 font-bold">
                    <span>Altitude</span>
                    <span id="alt-val" class="text-white tech-font">---</span>
                </div>
                <div class="h-[1px] w-full bg-white/10"></div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[11px] text-gray-500 uppercase tracking-widest font-bold">
                    <span>Elevation Offset</span>
                    <span id="offset-val" class="text-[#a2d032] tech-font">-44m</span>
                </div>
                <input type="range" id="elevation-slider" min="-2500" max="2500" value="-44" step="1"
                    class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-[#a2d032]"
                    oninput="updateElevation(this.value)">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="zoomToScan()"
                    class="py-3 glass-panel text-[9px] uppercase font-bold tracking-widest text-[#a2d032] border-[#a2d032]/30 transition-all">Refocus</button>
                <select id="map-select" onchange="changeMap(this.value)"
                    class="py-3 px-1 glass-panel text-[9px] uppercase font-bold tracking-widest text-white border-white/20 transition-all outline-none cursor-pointer hover:bg-white/5 appearance-none text-center">
                    <option value="osm" class="bg-[#0f0f14] text-white">Map: OSM</option>
                    <option value="basemap" class="bg-[#0f0f14] text-white">Map: Basemap</option>
                    <option value="ortho" class="bg-[#0f0f14] text-white">Map: Ortho</option>
                    <option value="off" class="bg-[#0f0f14] text-gray-500">Map: OFF</option>
                </select>
            </div>
        </div>
    </div>
    </div>

    <script>
        // Hide return button if inside iframe
        if (window.self !== window.top) {
            const portalBtn = document.querySelector('a[href="index.html"]');
            if (portalBtn) portalBtn.parentElement.style.display = 'none';
        }

        // Initialize Map Providers
        const osmProvider = new Cesium.UrlTemplateImageryProvider({
            url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            maximumLevel: 19,
            credit: '© OpenStreetMap contributors'
        });

        const basemapProvider = new Cesium.UrlTemplateImageryProvider({
            url: 'https://mapsneu.wien.gv.at/basemap/geolandbasemap/normal/google3857/{z}/{y}/{x}.png',
            maximumLevel: 19,
            credit: 'Datenquelle: basemap.at'
        });

        const orthofotoProvider = new Cesium.UrlTemplateImageryProvider({
            url: 'https://mapsneu.wien.gv.at/basemap/bmaporthofoto30cm/normal/google3857/{z}/{y}/{x}.jpeg',
            maximumLevel: 20,
            credit: 'Datenquelle: basemap.at'
        });

        const viewer = new Cesium.Viewer('cesium-container', {
            imageryProvider: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            selectionIndicator: false,
            infoBox: false,
            scene3DOnly: true,
            shadows: false,
            skyAtmosphere: false,
            requestRenderMode: false
        });

        viewer.imageryLayers.addImageryProvider(osmProvider);
        async function initTerrain() {
            try {
                // Lädt die layer.json aus deinem ./terrain Ordner
                const terrainProvider = await Cesium.CesiumTerrainProvider.fromUrl('./terrain', {
                    requestVertexNormals: true // Ermöglicht korrektes Shading auf dem Gelände
                });
                viewer.terrainProvider = terrainProvider;
            } catch (error) {
                console.error("Fehler beim Laden des lokalen Geländes:", error);
            }
        }
        initTerrain();

        // Core Environment Stability
        viewer.scene.globe.show = true;
        viewer.scene.globe.depthTestAgainstTerrain = true;

        // --- ADD LIGHTING ---
        // Ensuring the model is illuminated from an "Overhead Sun" position
        viewer.scene.light = new Cesium.DirectionalLight({
            direction: new Cesium.Cartesian3(0.5, -0.2, -1.0)
        });

        let currentTileset = null;
        let baseCenter = null;

        async function setupTileset() {
            try {
                const tileset = await Cesium.Cesium3DTileset.fromUrl('../strips_online/tileset.json', {
                    maximumScreenSpaceError: 16
                });

                viewer.scene.primitives.add(tileset);
                currentTileset = tileset;
                baseCenter = tileset.boundingSphere.center.clone();

                // Apply initial -44m offset
                updateElevation(0);

                // Initial Zoom - Increased range to show whole data
                viewer.zoomTo(tileset, new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-35), 750));

                const carto = Cesium.Cartographic.fromCartesian(baseCenter);
                const latStr = Cesium.Math.toDegrees(carto.latitude).toFixed(5);
                const lonStr = Cesium.Math.toDegrees(carto.longitude).toFixed(5);
                document.getElementById('loc-display').innerText = `${latStr}N, ${lonStr}E (Active)`;

                setTimeout(() => {
                    const overlay = document.getElementById('loading-overlay');
                    if (overlay) {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.style.display = 'none', 1000);
                    }
                }, 1000);

            } catch (error) {
                console.error('Tileset Load Error:', error);
            }
        }

        function updateElevation(value) {
            if (!currentTileset || !baseCenter) return;

            const offset = parseFloat(value);
            document.getElementById('offset-val').innerText = offset + 'm';

            const carto = Cesium.Cartographic.fromCartesian(baseCenter);
            carto.height += offset;

            const targetPos = Cesium.Cartographic.toCartesian(carto);
            const translation = Cesium.Cartesian3.subtract(targetPos, baseCenter, new Cesium.Cartesian3());
            currentTileset.modelMatrix = Cesium.Matrix4.fromTranslation(translation);
        }

        setupTileset();

        viewer.scene.postRender.addEventListener(function () {
            if (viewer.camera.positionCartographic) {
                const h = viewer.camera.positionCartographic.height;
                document.getElementById('alt-val').innerText = h > 1000 ? (h / 1000).toFixed(1) + ' km' : Math.round(h) + ' m';
            }
        });

        function zoomToScan() {
            if (currentTileset) {
                // Refocus distance increased to match the initial overview perspective
                viewer.zoomTo(currentTileset, new Cesium.HeadingPitchRange(viewer.camera.heading, Cesium.Math.toRadians(-45), 750));
            }
        }

        function changeMap(mapType) {
            viewer.imageryLayers.removeAll();
            if (mapType === 'osm') {
                viewer.imageryLayers.addImageryProvider(osmProvider);
            } else if (mapType === 'basemap') {
                viewer.imageryLayers.addImageryProvider(basemapProvider);
            } else if (mapType === 'ortho') {
                viewer.imageryLayers.addImageryProvider(orthofotoProvider);
            }
        }
    </script>
</body>

</html>
